<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 320" fill="none">
  <defs>
    <linearGradient id="g-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#247CFF"/>
      <stop offset="100%" stop-color="#6BA3FF"/>
    </linearGradient>
    <linearGradient id="g-glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#FFF8E1" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#FFF8E1" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#247CFF" flood-opacity="0.12"/>
    </filter>
    <filter id="shadow-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1A1A2E" flood-opacity="0.08"/>
    </filter>
  </defs>

  <ellipse cx="180" cy="155" rx="130" ry="120" fill="url(#g-glow)"/>

  <!-- Calendar -->
  <g filter="url(#shadow-sm)">
    <rect x="118" y="48" width="124" height="108" rx="16" fill="#FFFFFF" stroke="#B8D4FF" stroke-width="1.5"/>
    <rect x="118" y="48" width="124" height="32" rx="16" fill="url(#g-blue)"/>
    <rect x="118" y="64" width="124" height="16" fill="url(#g-blue)"/>
    <text x="180" y="70" text-anchor="middle" font-family="Arial,sans-serif" font-size="12" font-weight="700" fill="#FFFFFF">JUN 2026</text>
    <!-- Calendar grid -->
    <g fill="#F0F0F0">
      <rect x="130" y="90" width="14" height="14" rx="4"/>
      <rect x="150" y="90" width="14" height="14" rx="4"/>
      <rect x="170" y="90" width="14" height="14" rx="4"/>
      <rect x="190" y="90" width="14" height="14" rx="4"/>
      <rect x="210" y="90" width="14" height="14" rx="4"/>
      <rect x="130" y="110" width="14" height="14" rx="4"/>
      <rect x="150" y="110" width="14" height="14" rx="4"/>
      <rect x="210" y="110" width="14" height="14" rx="4"/>
      <rect x="130" y="130" width="14" height="14" rx="4"/>
      <rect x="150" y="130" width="14" height="14" rx="4"/>
      <rect x="190" y="130" width="14" height="14" rx="4"/>
      <rect x="210" y="130" width="14" height="14" rx="4"/>
    </g>
    <!-- Highlighted expiry date -->
    <rect x="168" y="108" width="18" height="18" rx="5" fill="#247CFF"/>
    <text x="177" y="121" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">15</text>
    <rect x="188" y="108" width="18" height="18" rx="5" fill="#FFA000"/>
    <text x="197" y="121" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">16</text>
  </g>

  <!-- Bell icon -->
  <g filter="url(#shadow-sm)">
    <circle cx="72" cy="88" r="30" fill="url(#g-blue)"/>
    <path d="M72 68c-5.5 0-10 4-10 9v6.5c0 1-.4 2-1.1 2.7l-2.2 2.2c-.5.5-.1 1.4.7 1.4h25.2c.8 0 1.2-.9.7-1.4l-2.2-2.2c-.7-.7-1.1-1.7-1.1-2.7V77c0-5-4.5-9-10-9z" fill="#FFFFFF"/>
    <path d="M66 96c0 3.3 2.7 6 6 6s6-2.7 6-6" stroke="#FFFFFF" stroke-width="2" stroke-linecap="round"/>
    <circle cx="88" cy="72" r="8" fill="#FF5252" stroke="#FFFFFF" stroke-width="2"/>
  </g>

  <!-- Notification card -->
  <g filter="url(#shadow)">
    <rect x="88" y="195" width="184" height="72" rx="16" fill="#FFFFFF" stroke="#EDEDED" stroke-width="1.5"/>
    <rect x="100" y="207" width="40" height="40" rx="12" fill="url(#g-blue)"/>
    <path d="M112 223c-2.2 0-4 1.5-4 3.4v2.6c0 .4-.1.7-.4 1l-.9.9c-.2.2 0 .6.3.6h9.8c.3 0 .5-.4.3-.6l-.9-.9c-.3-.3-.4-.6-.4-1v-2.6c0-1.9-1.8-3.4-4-3.4z" fill="#FFFFFF"/>
    <circle cx="124" cy="215" r="5" fill="#FF5252" stroke="#FFFFFF" stroke-width="1.5"/>
    <text x="152" y="222" font-family="Arial,sans-serif" font-size="11" font-weight="700" fill="#1A1A2E">Expiry Alert</text>
    <text x="152" y="238" font-family="Arial,sans-serif" font-size="9" fill="#9E9E9E">Product expires in 3 days</text>
    <rect x="152" y="246" width="56" height="14" rx="7" fill="#247CFF" fill-opacity="0.12"/>
    <text x="180" y="256" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="600" fill="#247CFF">SKU-2847</text>
  </g>

  <!-- Generic product container chips -->
  <g filter="url(#shadow-sm)">
    <rect x="258" y="168" width="78" height="32" rx="10" fill="#FFFFFF" stroke="#FFA000" stroke-width="1.5"/>
    <rect x="268" y="176" width="16" height="16" rx="4" fill="#FFA000" fill-opacity="0.15"/>
    <rect x="272" y="180" width="8" height="8" rx="2" fill="#FFA000"/>
    <text x="292" y="188" font-family="Arial,sans-serif" font-size="9" font-weight="600" fill="#FFA000">3 days</text>
  </g>

  <g filter="url(#shadow-sm)">
    <rect x="24" y="168" width="78" height="32" rx="10" fill="#FFFFFF" stroke="#388E3C" stroke-width="1.5"/>
    <rect x="34" y="176" width="16" height="16" rx="4" fill="#388E3C" fill-opacity="0.15"/>
    <rect x="38" y="180" width="8" height="8" rx="2" fill="#388E3C"/>
    <text x="58" y="188" font-family="Arial,sans-serif" font-size="9" font-weight="600" fill="#388E3C">7 days</text>
  </g>

  <!-- Reminder icon -->
  <g filter="url(#shadow-sm)">
    <rect x="268" y="52" width="56" height="56" rx="14" fill="#FFFFFF" stroke="#EDEDED" stroke-width="1.5"/>
    <circle cx="296" cy="72" r="14" fill="#247CFF" fill-opacity="0.12"/>
    <path d="M296 64v8l5 3" stroke="#247CFF" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <rect x="278" y="92" width="36" height="4" rx="2" fill="#E0E0E0"/>
    <rect x="284" y="100" width="24" height="3" rx="1.5" fill="#E0E0E0"/>
  </g>
</svg>
