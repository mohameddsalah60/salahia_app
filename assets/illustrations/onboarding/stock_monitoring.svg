<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 320" fill="none">
  <defs>
    <linearGradient id="g-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#247CFF"/>
      <stop offset="100%" stop-color="#6BA3FF"/>
    </linearGradient>
    <linearGradient id="g-level" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#247CFF"/>
      <stop offset="100%" stop-color="#6BA3FF"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#247CFF" flood-opacity="0.12"/>
    </filter>
    <filter id="shadow-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1A1A2E" flood-opacity="0.08"/>
    </filter>
  </defs>

  <ellipse cx="180" cy="165" rx="135" ry="120" fill="#E8F1FF" fill-opacity="0.45"/>

  <!-- Warehouse shelf structure -->
  <g filter="url(#shadow-sm)">
    <rect x="48" y="72" width="264" height="8" rx="4" fill="#D0D0D0"/>
    <rect x="48" y="152" width="264" height="8" rx="4" fill="#D0D0D0"/>
    <rect x="48" y="232" width="264" height="8" rx="4" fill="#D0D0D0"/>
    <rect x="56" y="72" width="6" height="168" rx="3" fill="#E0E0E0"/>
    <rect x="298" y="72" width="6" height="168" rx="3" fill="#E0E0E0"/>
  </g>

  <!-- Shelf 1 products -->
  <g filter="url(#shadow-sm)">
    <rect x="72" y="88" width="52" height="52" rx="10" fill="#FFFFFF" stroke="#EDEDED" stroke-width="1.5"/>
    <rect x="80" y="96" width="20" height="20" rx="5" fill="#E8F1FF"/>
    <rect x="106" y="98" width="10" height="10" rx="5" fill="#388E3C"/>
    <rect x="80" y="122" width="36" height="10" rx="5" fill="#247CFF" fill-opacity="0.12"/>
    <text x="98" y="130" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="600" fill="#247CFF">EXP 08/26</text>
  </g>

  <g filter="url(#shadow-sm)">
    <rect x="136" y="92" width="48" height="48" rx="10" fill="#FFFFFF" stroke="#EDEDED" stroke-width="1.5"/>
    <rect x="144" y="100" width="18" height="18" rx="5" fill="#F5F7FA"/>
    <rect x="168" y="102" width="8" height="8" rx="4" fill="#388E3C"/>
    <rect x="144" y="124" width="32" height="8" rx="4" fill="#388E3C" fill-opacity="0.15"/>
    <text x="160" y="131" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="600" fill="#388E3C">OK</text>
  </g>

  <g filter="url(#shadow-sm)">
    <rect x="196" y="86" width="56" height="56" rx="10" fill="#FFFFFF" stroke="#FFA000" stroke-width="1.5"/>
    <rect x="206" y="96" width="22" height="22" rx="6" fill="#FFA000" fill-opacity="0.15"/>
    <rect x="234" y="100" width="8" height="8" rx="4" fill="#FFA000"/>
    <rect x="206" y="124" width="38" height="10" rx="5" fill="#FFA000"/>
    <text x="225" y="132" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="700" fill="#FFFFFF">LOW</text>
  </g>

  <g filter="url(#shadow-sm)">
    <rect x="264" y="90" width="44" height="50" rx="10" fill="#FFFFFF" stroke="#EDEDED" stroke-width="1.5"/>
    <rect x="272" y="98" width="16" height="16" rx="4" fill="#E8F1FF"/>
    <rect x="272" y="120" width="28" height="8" rx="4" fill="#E0E0E0"/>
  </g>

  <!-- Shelf 2 products -->
  <g filter="url(#shadow-sm)">
    <rect x="72" y="168" width="60" height="52" rx="10" fill="#FFFFFF" stroke="#EDEDED" stroke-width="1.5"/>
    <rect x="82" y="176" width="22" height="22" rx="6" fill="#F5F7FA"/>
    <rect x="82" y="204" width="40" height="8" rx="4" fill="#247CFF" fill-opacity="0.12"/>
    <text x="102" y="211" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="600" fill="#247CFF">EXP 22/07</text>
  </g>

  <g filter="url(#shadow-sm)">
    <rect x="144" y="172" width="52" height="48" rx="10" fill="#FFFFFF" stroke="#EDEDED" stroke-width="1.5"/>
    <rect x="152" y="180" width="20" height="20" rx="5" fill="#E8F1FF"/>
    <rect x="152" y="206" width="36" height="8" rx="4" fill="#388E3C" fill-opacity="0.15"/>
    <text x="170" y="213" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="600" fill="#388E3C">STABLE</text>
  </g>

  <g filter="url(#shadow-sm)">
    <rect x="208" y="166" width="56" height="56" rx="10" fill="#FFFFFF" stroke="#FF5252" stroke-width="1.5"/>
    <rect x="218" y="176" width="22" height="22" rx="6" fill="#FF5252" fill-opacity="0.12"/>
    <rect x="246" y="180" width="8" height="8" rx="4" fill="#FF5252"/>
    <rect x="218" y="204" width="38" height="10" rx="5" fill="#FF5252"/>
    <text x="237" y="212" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="700" fill="#FFFFFF">CRIT</text>
  </g>

  <!-- Stock level monitor panel -->
  <g filter="url(#shadow)">
    <rect x="88" y="252" width="184" height="52" rx="14" fill="#FFFFFF" stroke="#B8D4FF" stroke-width="1.5"/>
    <text x="108" y="272" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#1A1A2E">Stock Level</text>
    <!-- Progress bars -->
    <rect x="108" y="282" width="80" height="8" rx="4" fill="#F0F0F0"/>
    <rect x="108" y="282" width="64" height="8" rx="4" fill="url(#g-level)"/>
    <rect x="200" y="282" width="56" height="8" rx="4" fill="#F0F0F0"/>
    <rect x="200" y="282" width="28" height="8" rx="4" fill="#FFA000"/>
    <text x="264" y="290" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#247CFF">78%</text>
  </g>

  <!-- Monitor gauge -->
  <g filter="url(#shadow-sm)">
    <circle cx="52" cy="268" r="28" fill="#FFFFFF" stroke="#EDEDED" stroke-width="1.5"/>
    <circle cx="52" cy="268" r="20" fill="none" stroke="#F0F0F0" stroke-width="4"/>
    <path d="M52 248 A20 20 0 1 1 42 278" fill="none" stroke="url(#g-blue)" stroke-width="4" stroke-linecap="round"/>
    <text x="52" y="272" text-anchor="middle" font-family="Arial,sans-serif" font-size="10" font-weight="700" fill="#247CFF">78</text>
  </g>

  <!-- Alert indicator -->
  <g filter="url(#shadow-sm)">
    <rect x="288" y="248" width="52" height="52" rx="14" fill="url(#g-blue)"/>
    <rect x="298" y="262" width="32" height="4" rx="2" fill="#FFFFFF" fill-opacity="0.5"/>
    <rect x="298" y="272" width="24" height="4" rx="2" fill="#FFFFFF" fill-opacity="0.5"/>
    <rect x="298" y="282" width="28" height="4" rx="2" fill="#FFFFFF" fill-opacity="0.5"/>
  </g>
</svg>
