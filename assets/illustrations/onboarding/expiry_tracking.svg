<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 320" fill="none">
  <defs>
    <linearGradient id="g-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#247CFF"/>
      <stop offset="100%" stop-color="#6BA3FF"/>
    </linearGradient>
    <linearGradient id="g-glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#E8F1FF" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#E8F1FF" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#247CFF" flood-opacity="0.12"/>
    </filter>
    <filter id="shadow-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#1A1A2E" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Background glow -->
  <ellipse cx="180" cy="155" rx="130" ry="120" fill="url(#g-glow)"/>

  <!-- Product box 1 -->
  <g filter="url(#shadow-sm)" transform="rotate(-6 95 175)">
    <rect x="40" y="130" width="110" height="90" rx="14" fill="#FFFFFF" stroke="#EDEDED" stroke-width="1.5"/>
    <rect x="52" y="142" width="40" height="40" rx="10" fill="#E8F1FF"/>
    <rect x="58" y="152" width="28" height="4" rx="2" fill="#B8D4FF"/>
    <rect x="58" y="162" width="20" height="4" rx="2" fill="#B8D4FF"/>
    <rect x="100" y="148" width="38" height="14" rx="7" fill="#247CFF" fill-opacity="0.12"/>
    <text x="119" y="158" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#247CFF">EXP</text>
    <rect x="100" y="168" width="38" height="16" rx="6" fill="url(#g-blue)"/>
    <text x="119" y="180" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#FFFFFF">30/06</text>
  </g>

  <!-- Product box 2 -->
  <g filter="url(#shadow-sm)" transform="rotate(4 245 150)">
    <rect x="210" y="105" width="100" height="82" rx="14" fill="#FFFFFF" stroke="#EDEDED" stroke-width="1.5"/>
    <rect x="222" y="117" width="36" height="36" rx="9" fill="#F5F7FA"/>
    <rect x="228" y="126" width="24" height="3" rx="1.5" fill="#D0D0D0"/>
    <rect x="228" y="134" width="18" height="3" rx="1.5" fill="#D0D0D0"/>
    <rect x="266" y="120" width="34" height="12" rx="6" fill="#FFA000" fill-opacity="0.15"/>
    <text x="283" y="129" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="700" fill="#FFA000">EXP</text>
    <rect x="266" y="138" width="34" height="14" rx="5" fill="#FFA000"/>
    <text x="283" y="149" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#FFFFFF">15/07</text>
  </g>

  <!-- Product box 3 (center) -->
  <g filter="url(#shadow)">
    <rect x="118" y="175" width="124" height="96" rx="16" fill="#FFFFFF" stroke="#B8D4FF" stroke-width="1.5"/>
    <rect x="132" y="189" width="48" height="48" rx="12" fill="#E8F1FF"/>
    <rect x="142" y="201" width="28" height="4" rx="2" fill="#6BA3FF"/>
    <rect x="142" y="211" width="22" height="4" rx="2" fill="#6BA3FF"/>
    <rect x="142" y="221" width="18" height="4" rx="2" fill="#B8D4FF"/>
    <!-- Barcode sticker -->
    <rect x="188" y="192" width="42" height="34" rx="6" fill="#F5F7FA" stroke="#EDEDED"/>
    <rect x="194" y="198" width="2" height="22" fill="#1A1A2E"/>
    <rect x="198" y="198" width="1" height="22" fill="#9E9E9E"/>
    <rect x="201" y="198" width="3" height="22" fill="#1A1A2E"/>
    <rect x="206" y="198" width="1" height="22" fill="#9E9E9E"/>
    <rect x="209" y="198" width="2" height="22" fill="#1A1A2E"/>
    <rect x="213" y="198" width="4" height="22" fill="#1A1A2E"/>
    <rect x="219" y="198" width="1" height="22" fill="#9E9E9E"/>
    <rect x="222" y="198" width="2" height="22" fill="#1A1A2E"/>
    <rect x="188" y="232" width="42" height="10" rx="5" fill="url(#g-blue)"/>
    <text x="209" y="240" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="700" fill="#FFFFFF">12/08</text>
  </g>

  <!-- Notification badge -->
  <g filter="url(#shadow-sm)">
    <circle cx="295" cy="72" r="28" fill="url(#g-blue)"/>
    <path d="M295 58c-4.4 0-8 3.2-8 7.2v5.6c0 .8-.3 1.6-.9 2.2l-1.8 1.8c-.4.4-.1 1.2.5 1.2h20.4c.6 0 .9-.8.5-1.2l-1.8-1.8c-.6-.6-.9-1.4-.9-2.2v-5.6c0-4-3.6-7.2-8-7.2z" fill="#FFFFFF"/>
    <circle cx="307" cy="62" r="7" fill="#FF5252" stroke="#FFFFFF" stroke-width="2"/>
    <text x="307" y="65" text-anchor="middle" font-family="Arial,sans-serif" font-size="8" font-weight="700" fill="#FFFFFF">3</text>
  </g>

  <!-- Label tag floating -->
  <g filter="url(#shadow-sm)" transform="rotate(-12 62 95)">
    <rect x="28" y="78" width="68" height="28" rx="8" fill="#FFFFFF" stroke="#247CFF" stroke-width="1.5"/>
    <circle cx="42" cy="92" r="6" fill="#247CFF" fill-opacity="0.15"/>
    <path d="M40 92l1.5 1.5 3-3" stroke="#247CFF" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="54" y="96" font-family="Arial,sans-serif" font-size="9" font-weight="600" fill="#1A1A2E">Expiry Tag</text>
  </g>
</svg>
