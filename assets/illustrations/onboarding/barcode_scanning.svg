<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 320" fill="none">
  <defs>
    <linearGradient id="g-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#247CFF"/>
      <stop offset="100%" stop-color="#6BA3FF"/>
    </linearGradient>
    <linearGradient id="g-scan" x1="0" y1="0.5" x2="1" y2="0.5">
      <stop offset="0%" stop-color="#247CFF" stop-opacity="0"/>
      <stop offset="50%" stop-color="#247CFF"/>
      <stop offset="100%" stop-color="#247CFF" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="g-glow" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#247CFF" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#247CFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#247CFF" flood-opacity="0.15"/>
    </filter>
    <filter id="shadow-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1A1A2E" flood-opacity="0.08"/>
    </filter>
  </defs>

  <ellipse cx="180" cy="160" rx="140" ry="130" fill="url(#g-glow)"/>

  <!-- Scanner device -->
  <g filter="url(#shadow)">
    <rect x="105" y="40" width="150" height="240" rx="24" fill="#FFFFFF" stroke="#B8D4FF" stroke-width="2"/>
    <rect x="155" y="52" width="50" height="6" rx="3" fill="#E0E0E0"/>
    <!-- Screen area -->
    <rect x="118" y="72" width="124" height="196" rx="12" fill="#F5F7FA"/>

    <!-- Generic product package inside screen -->
    <rect x="138" y="100" width="84" height="72" rx="12" fill="#FFFFFF" stroke="#EDEDED" stroke-width="1.5"/>
    <rect x="150" y="112" width="32" height="32" rx="8" fill="#E8F1FF"/>
    <rect x="158" y="122" width="16" height="3" rx="1.5" fill="#6BA3FF"/>
    <rect x="158" y="130" width="12" height="3" rx="1.5" fill="#B8D4FF"/>
    <!-- Barcode on package -->
    <rect x="188" y="112" width="26" height="28" rx="4" fill="#F5F7FA" stroke="#EDEDED"/>
    <rect x="192" y="116" width="2" height="20" fill="#1A1A2E"/>
    <rect x="196" y="116" width="1" height="20" fill="#9E9E9E"/>
    <rect x="199" y="116" width="3" height="20" fill="#1A1A2E"/>
    <rect x="204" y="116" width="1" height="20" fill="#9E9E9E"/>
    <rect x="207" y="116" width="2" height="20" fill="#1A1A2E"/>
    <rect x="211" y="116" width="3" height="20" fill="#1A1A2E"/>

    <!-- Scan line -->
    <rect x="128" y="148" width="104" height="3" rx="1.5" fill="url(#g-scan)"/>
    <rect x="128" y="146" width="104" height="7" rx="3.5" fill="#247CFF" fill-opacity="0.08"/>

    <!-- QR code element -->
    <rect x="148" y="190" width="36" height="36" rx="6" fill="#FFFFFF" stroke="#247CFF" stroke-width="1.5"/>
    <rect x="154" y="196" width="10" height="10" rx="2" fill="#247CFF"/>
    <rect x="168" y="196" width="10" height="10" rx="2" fill="#247CFF" fill-opacity="0.4"/>
    <rect x="154" y="210" width="10" height="10" rx="2" fill="#247CFF" fill-opacity="0.4"/>
    <rect x="168" y="210" width="4" height="4" fill="#247CFF"/>
    <rect x="174" y="210" width="4" height="4" fill="#247CFF"/>
    <rect x="168" y="216" width="4" height="4" fill="#247CFF"/>
    <rect x="174" y="216" width="4" height="4" fill="#247CFF" fill-opacity="0.4"/>

    <!-- Scan result card -->
    <rect x="196" y="190" width="36" height="36" rx="6" fill="url(#g-blue)"/>
    <path d="M208 208l4 4 8-8" stroke="#FFFFFF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Scan corners -->
  <path d="M88 110 L88 88 L110 88" stroke="#247CFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M272 88 L272 110 L250 110" stroke="#247CFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M88 210 L88 232 L110 232" stroke="#247CFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <path d="M272 232 L272 210 L250 210" stroke="#247CFF" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Handheld scanner -->
  <g filter="url(#shadow-sm)" transform="rotate(-15 52 240)">
    <rect x="20" y="220" width="64" height="36" rx="10" fill="#FFFFFF" stroke="#EDEDED" stroke-width="1.5"/>
    <rect x="28" y="228" width="20" height="20" rx="4" fill="#247CFF" fill-opacity="0.15"/>
    <rect x="32" y="232" width="12" height="12" rx="2" fill="url(#g-blue)"/>
    <rect x="52" y="232" width="24" height="4" rx="2" fill="#E0E0E0"/>
    <rect x="52" y="240" width="18" height="3" rx="1.5" fill="#E0E0E0"/>
  </g>
</svg>
