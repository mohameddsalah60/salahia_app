<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 320" fill="none">
  <defs>
    <linearGradient id="g-blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#247CFF"/>
      <stop offset="100%" stop-color="#6BA3FF"/>
    </linearGradient>
    <linearGradient id="g-bar1" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#B8D4FF"/>
      <stop offset="100%" stop-color="#B8D4FF" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="g-bar2" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#6BA3FF"/>
      <stop offset="100%" stop-color="#6BA3FF" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="g-bar3" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0%" stop-color="#247CFF"/>
      <stop offset="100%" stop-color="#247CFF" stop-opacity="0.6"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#247CFF" flood-opacity="0.12"/>
    </filter>
    <filter id="shadow-sm" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#1A1A2E" flood-opacity="0.08"/>
    </filter>
  </defs>

  <ellipse cx="180" cy="160" rx="140" ry="125" fill="#E8F1FF" fill-opacity="0.5"/>

  <!-- Dashboard card -->
  <g filter="url(#shadow)">
    <rect x="48" y="52" width="264" height="216" rx="20" fill="#FFFFFF" stroke="#B8D4FF" stroke-width="1.5"/>

    <!-- Header -->
    <text x="72" y="84" font-family="Arial,sans-serif" font-size="14" font-weight="700" fill="#1A1A2E">Inventory</text>
    <rect x="248" y="68" width="48" height="22" rx="8" fill="#E8F1FF"/>
    <text x="272" y="83" text-anchor="middle" font-family="Arial,sans-serif" font-size="9" font-weight="700" fill="#247CFF">248</text>

    <!-- Chart area -->
    <rect x="72" y="98" width="216" height="72" rx="10" fill="#F8FAFF"/>
    <rect x="88" y="142" width="20" height="20" rx="4" fill="url(#g-bar1)"/>
    <rect x="116" y="128" width="20" height="34" rx="4" fill="url(#g-bar2)"/>
    <rect x="144" y="136" width="20" height="26" rx="4" fill="url(#g-bar1)"/>
    <rect x="172" y="118" width="20" height="44" rx="4" fill="url(#g-bar3)"/>
    <rect x="200" y="130" width="20" height="32" rx="4" fill="url(#g-bar2)"/>
    <rect x="228" y="122" width="20" height="40" rx="4" fill="url(#g-bar3)"/>
    <rect x="256" y="132" width="20" height="30" rx="4" fill="url(#g-bar2)"/>

    <!-- Inventory cards row -->
    <rect x="72" y="186" width="96" height="64" rx="12" fill="#F8FAFF" stroke="#EDEDED"/>
    <rect x="84" y="198" width="28" height="28" rx="8" fill="#E8F1FF"/>
    <rect x="90" y="206" width="16" height="3" rx="1.5" fill="#6BA3FF"/>
    <rect x="90" y="214" width="12" height="3" rx="1.5" fill="#B8D4FF"/>
    <rect x="118" y="200" width="6" height="6" rx="3" fill="#388E3C"/>
    <text x="128" y="207" font-family="Arial,sans-serif" font-size="9" font-weight="600" fill="#1A1A2E">Item A</text>
    <text x="128" y="222" font-family="Arial,sans-serif" font-size="8" fill="#9E9E9E">Qty: 42</text>
    <rect x="118" y="230" width="38" height="12" rx="6" fill="#247CFF" fill-opacity="0.12"/>
    <text x="137" y="239" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="600" fill="#247CFF">EXP 30/06</text>

    <rect x="180" y="186" width="96" height="64" rx="12" fill="#F8FAFF" stroke="#EDEDED"/>
    <rect x="192" y="198" width="28" height="28" rx="8" fill="#F5F7FA"/>
    <rect x="198" y="206" width="16" height="3" rx="1.5" fill="#D0D0D0"/>
    <rect x="198" y="214" width="12" height="3" rx="1.5" fill="#D0D0D0"/>
    <rect x="226" y="200" width="6" height="6" rx="3" fill="#FFA000"/>
    <text x="236" y="207" font-family="Arial,sans-serif" font-size="9" font-weight="600" fill="#1A1A2E">Item B</text>
    <text x="236" y="222" font-family="Arial,sans-serif" font-size="8" fill="#9E9E9E">Qty: 18</text>
    <rect x="226" y="230" width="38" height="12" rx="6" fill="#FFA000" fill-opacity="0.15"/>
    <text x="245" y="239" text-anchor="middle" font-family="Arial,sans-serif" font-size="7" font-weight="600" fill="#FFA000">EXP 15/07</text>
  </g>

  <!-- Floating inventory card -->
  <g filter="url(#shadow-sm)" transform="rotate(6 310 120)">
    <rect x="278" y="88" width="64" height="48" rx="10" fill="#FFFFFF" stroke="#247CFF" stroke-width="1.5"/>
    <rect x="288" y="98" width="20" height="20" rx="5" fill="url(#g-blue)"/>
    <rect x="294" y="104" width="8" height="8" rx="2" fill="#FFFFFF"/>
    <rect x="314" y="100" width="20" height="3" rx="1.5" fill="#E0E0E0"/>
    <rect x="314" y="108" width="14" height="3" rx="1.5" fill="#E0E0E0"/>
    <rect x="288" y="124" width="44" height="3" rx="1.5" fill="#247CFF" fill-opacity="0.3"/>
  </g>

  <!-- Barcode label sticker -->
  <g filter="url(#shadow-sm)" transform="rotate(-8 40 240)">
    <rect x="16" y="228" width="72" height="40" rx="8" fill="#FFFFFF" stroke="#EDEDED" stroke-width="1.5"/>
    <rect x="24" y="236" width="2" height="16" fill="#1A1A2E"/>
    <rect x="28" y="236" width="1" height="16" fill="#9E9E9E"/>
    <rect x="31" y="236" width="3" height="16" fill="#1A1A2E"/>
    <rect x="36" y="236" width="1" height="16" fill="#9E9E9E"/>
    <rect x="39" y="236" width="2" height="16" fill="#1A1A2E"/>
    <rect x="43" y="236" width="4" height="16" fill="#1A1A2E"/>
    <rect x="49" y="236" width="1" height="16" fill="#9E9E9E"/>
    <rect x="52" y="236" width="2" height="16" fill="#1A1A2E"/>
    <rect x="24" y="256" width="52" height="8" rx="4" fill="#E8F1FF"/>
    <text x="50" y="263" text-anchor="middle" font-family="Arial,sans-serif" font-size="6" font-weight="600" fill="#247CFF">LABEL</text>
  </g>
</svg>
